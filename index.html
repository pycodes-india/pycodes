        const toolsGrid = document.getElementById('toolsGrid');

        function initTools() {
            toolsData.forEach(tool => {
                // Generate SEO-friendly URLs (e.g., "Age Calculator" -> "age-calculator.html")
                const toolSlug = tool.name.toLowerCase().replace(/ /g, '-');
                const toolURL = `https://www.pycodes.in/${toolSlug}`;

                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-name', tool.name.toLowerCase());

                // Hover Effects via JS for shadow
                card.addEventListener('mouseenter', () => {
                    card.style.boxShadow = `0 15px 30px ${tool.color}33`; 
                });
                card.addEventListener('mouseleave', () => {
                    card.style.boxShadow = '';
                });

                card.innerHTML = `
                    <div class="card-icon-bg" style="background-color: ${tool.color};"></div>
                    <i class="${tool.icon} card-icon" style="color: ${tool.color};"></i>
                    <h2>${tool.name}</h2>
                    <p>${tool.desc}</p>
                    
                    <div class="how-to-use" style="border-left: 3px solid ${tool.color};">
                        <strong style="color: ${tool.color};"><i class="fa-solid fa-circle-info"></i> How to use:</strong> 
                        ${tool.howTo}
                    </div>
                    
                    <a href="${toolURL}" class="tool-btn" style="background-color: ${tool.color};" title="Go to ${tool.name}">
                        Launch Tool
                    </a>
                `;
                toolsGrid.appendChild(card);
            });
        }

        initTools();

        // Search Filter
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', function() {
            const query = searchInput.value.toLowerCase();
            const cards = document.querySelectorAll('.card');

            cards.forEach(card => {
                const title = card.getAttribute('data-name');
                if (title.includes(query)) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        });
    </script>
