    <style>
        :root{
            /* ---- Color tokens (matches PyCode Online's site-wide theme) ---- */
            --bg:            #0a0e14;
            --bg-panel:      #10151c;
            --bg-elevated:   #161c25;
            --bg-input:      #0d1117;
            --border:        #232b36;
            --border-soft:   #1b212b;
            --text:          #e6edf3;
            --text-dim:      #8b98a5;
            --text-faint:    #5b6774;
            --accent:        #9a64ff;  /* terminal green — signature */
            --accent-dim:    #7d5fd1;
            --accent2:      rgb(178, 77, 245);   /* electric green */
            --danger:        #f85149;
            --warn:          #d29922;

            --mono: 'JetBrains Mono', 'Consolas', monospace;
            --sans: 'Inter', system-ui, sans-serif;

            --radius: 8px;
        }

        *{ margin:0; padding:0; box-sizing:border-box; }
        html, body{ height:100%; }
        html{ scroll-behavior:smooth; }

        body{
            background:
                radial-gradient(ellipse 900px 500px at 15% -10%, rgba(126,231,135,0.06), transparent),
                radial-gradient(ellipse 700px 500px at 100% 0%, rgba(88,166,255,0.05), transparent),
                var(--bg);
            color: var(--text);
            font-family: var(--sans);
            height: 100vh;
            overflow: hidden;
            display:flex;
            flex-direction:column;
        }

        a{ color: inherit; }
        ::selection{ background: var(--accent-dim); color:#fff; }
        ::-webkit-scrollbar{ width:10px; height:10px; }
        ::-webkit-scrollbar-track{ background: var(--bg-panel); }
        ::-webkit-scrollbar-thumb{ background: var(--border); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover{ background: var(--text-faint); }

        /* ============ HEADER (slim, matches Python compiler) ============ */
        header{
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 14px 1%;
            display:flex;
            align-items:center;
            justify-content:space-between;
            flex: 0 0 auto;
            z-index: 50;
        }

        .logo{ display:flex; align-items:center; gap:10px; text-decoration:none; }
        .logo .prompt-symbol{ font-family: var(--mono); color: var(--accent); font-weight:700; font-size:1.5rem; }
        .logo .brand{ font-family: var(--mono); font-size: 1.25rem; font-weight:700; color: var(--text); letter-spacing: -0.02em; }
        .logo .brand span{ color: var(--text-dim); font-weight:500; }

        header .header-tag{
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--text-faint);
            border: 1px solid var(--border);
            border-radius: 0px;
            padding: 5px 12px;
            display:flex;
            align-items:center;
            gap:7px;
        }
        header .header-tag .status-dot{
            width:6px; height:6px; border-radius:50%;
            background: var(--accent);
        }

        /* ============ MAIN LAYOUT ============ */
        .ide-wrap{
            padding: 0px 0%;
            flex: 1;
            min-height: 0;
            display:flex;
            flex-direction:column;
        }

        .workspace-outer{
            display:flex;
            gap: 0px;
            flex: 1;
            min-height: 0;
            align-items: stretch;
        }

        /* ============ LANGUAGE SIDEBAR ============ */
        .lang-sidebar{
            width: 40px;
            flex: 0 0 50px;
            background: var(--bg-panel);
            border-radius: 0px;
            padding: 14px 0px;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap: 10px;
        }

        .lang-sidebar .sidebar-label{
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-faint);
            margin-bottom: 4px;
            text-align:center;
        }

        .lang-icon{
            position: relative;
            width: 40px;
            height: 40px;
            border-radius: 0px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-family: var(--mono);
            font-weight: 700;
            font-size: 0.72rem;
            text-decoration:none;
            cursor:pointer;
            transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
            flex-shrink:0;
        }
        .lang-icon:hover{ transform: translateY(-2px); border-color: var(--text-faint); }
        .lang-icon.active{ border:1px solid #333; }
      .lang-icon img{
    height:25px;
    width:25px;
}
        /* ============ IDE WINDOW (flat, matches Python compiler) ============ */
        .ide-window{
            background: var(--bg-panel);
            border: 1px solid var(--border);
            overflow:hidden;
            display:flex;
            flex-direction:column;
            flex:1;
            min-width:0;
            min-height:0;
        }

        .titlebar{
            background: var(--bg-elevated); border-bottom: 1px solid var(--border);
            padding: 5px 16px; display:flex; align-items:center; gap: 14px;
        }
        .traffic-lights{ display:flex; gap:7px; }
        .dot{ width:11px; height:11px; border-radius:50%; }
        .dot.red{ background:#f85149; }
        .dot.yellow{ background:#d29922; }
        .dot.green{ background:#3fb950; }

        .file-tab{
            font-family: var(--mono); font-size: 0.82rem; color: var(--text-dim);
            background: var(--bg-panel); border: 1px solid var(--border-soft);
            padding: 5px 12px; border-radius: 6px; display:flex; align-items:center; gap:7px;
        }
        .file-tab .dot-mini{ width:6px; height:6px; border-radius:50%; background: var(--accent); }

        .titlebar .run-hint{
            margin-left:auto; font-family: var(--mono); font-size: 0.75rem; color: var(--text-faint);
            display:flex; gap:6px;
        }

        kbd{
            font-family: var(--mono); background: var(--bg-input); border: 1px solid var(--border);
            border-bottom-width:2px; padding: 1px 6px; border-radius: 4px; font-size: 0.72rem; color: var(--text-dim);
        }

        .btn{
            font-family: var(--sans); font-weight:600; font-size: 0.88rem; border:none; border-radius: 6px;
            padding: 9px 20px; cursor:pointer; display:inline-flex; align-items:center; gap:8px;
            transition: transform .12s ease, box-shadow .12s ease, background .15s ease, opacity .12s ease;
            text-transform:none; letter-spacing:normal;
        }

        .pane-actions .btn{ padding: 6px 13px; font-size: 0.74rem; border-radius: 5px; gap:6px; }

        .btn-run{
            background: var(--accent); color: #05170c;
            box-shadow: 0 0 0 1px var(--accent-dim);
        }
        .btn-run:hover{ transform: translateY(-1px); box-shadow: 0 0 0 1px var(--accent-dim), 0 6px 16px -6px  rgb(178, 77, 245); }
        .btn-run:active{ transform: translateY(0); }
        .btn-run:disabled{ opacity:0.55; cursor:default; transform:none; box-shadow: 0 0 0 1px var(--accent-dim); }

        .btn-clear{ background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
        .btn-clear:hover{ color: var(--text); border-color: var(--text-faint); }

        .std-select{
            font-family: var(--mono); font-size: 0.72rem; color: var(--text-dim);
            background: var(--bg-input); border: 1px solid var(--border); border-radius: 5px;
            padding: 6px 8px; cursor:pointer;
        }

        /* ============ WORKSPACE (editor / console panes) ============ */
        .workspace{ display:flex; flex:1; min-height: 0; }
        .pane{ flex:1; display:flex; flex-direction:column; min-width:0; min-height:0; }
        .pane.left{ border-right: 1px solid var(--border-soft); }

        /* ---- console-style pane head (shared look) ---- */
        .pane-head{
            padding: 6px 8px 3px 16px;
            font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.08em;
            text-transform: uppercase; color: var(--text-faint);
            display:flex; align-items:center; justify-content:space-between; gap:12px;
            flex-wrap:wrap; row-gap:6px;
            border-bottom: 1px solid var(--border-soft);
            background: var(--bg-elevated);
        }
        .pane-head .status-text{ display:flex; align-items:center; gap:8px; white-space:nowrap; }
        .pane-head .indicator{ width:6px; height:6px; border-radius:50%; background: var(--text-faint); flex-shrink:0; }
        .pane-head.running .indicator{ background: var(--warn); animation: pulse 0.8s infinite; }
        .pane-head.ok .indicator{ background: var(--accent); }
        .pane-head.err .indicator{ background: var(--danger); }
        @keyframes pulse{ 50%{ opacity:0.35; } }

        .pane-actions{ display:flex; align-items:center; gap:8px; flex-shrink:0; }

        .file-tabs{
            display:flex; gap:6px; padding: 8px 10px 0; background: var(--bg-panel);
            border-bottom: 1px solid var(--border-soft); overflow-x:auto;
        }
        .file-tab-btn{
            font-family: var(--mono); font-size: 0.8rem; color: var(--text-dim); background: var(--bg-elevated);
            border: 1px solid var(--border-soft); border-bottom: none; padding: 7px 14px; border-radius: 6px 6px 0 0;
            cursor:pointer; display:flex; align-items:center; gap:7px; white-space:nowrap;
            transition: color .15s ease, background .15s ease;
        }
        .file-tab-btn .dot-mini{ width:6px; height:6px; border-radius:50%; background: var(--text-faint); }
        .file-tab-btn.active{ color: var(--text); background: var(--bg-input); }
        .file-tab-btn.active .dot-mini{ background: var(--accent); }

        .editor-body{ flex:1; position:relative; display:flex; min-height:0; }
        .gutter{
            display:none;
            width: 46px; background: var(--bg-input); color: var(--text-faint); font-family: var(--mono);
            font-size: 14px; line-height: 1.65; text-align:right; padding: 16px 10px 16px 0;
            user-select:none; border-right: 1px solid var(--border-soft); overflow:hidden; flex-shrink:0;
        }
        .editor-stack{ flex:1; position:relative; min-width:0; }

        textarea{
            background: var(--bg-input); color: var(--text); font-family: var(--mono); font-size: 14px;
            line-height: 1.65; padding: 16px; border:none; outline:none; resize:none;
            caret-color: var(--accent); tab-size: 2; overflow-y:auto;
        }
        textarea.code-pane{ position:absolute; inset:0; width:100%; height:100%; }

        /* ---- console output ---- */
        .console{
            flex:1; min-height:0; width:100%; background:#050709; color: var(--text); font-family: var(--mono);
            font-size: 13.5px; line-height: 1.7; padding: 16px; overflow:auto; white-space:pre-wrap;
        }
        .console .line-out{ color:#c9d4de; }
        .console .line-err{ color: var(--danger); }
        .console .line-ok{ color: var(--accent); }
        .console .line-muted{ color: var(--text-faint); }
        .console .exit-code{ margin-top:10px; padding-top:10px; border-top:1px dashed var(--border-soft); color: var(--text-faint); font-size:12px; }

        .stdin-wrap{
            flex: 0 0 auto;
            border-top: 1px solid var(--border-soft); background: var(--bg-panel);
            padding: 10px 16px; display:flex; flex-direction:column; gap:6px;
        }
        .stdin-wrap label{
            font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.08em; text-transform:uppercase; color: var(--text-faint);
        }
        .stdin-wrap textarea{
            width:100%; height:52px; background: var(--bg-input); border: 1px solid var(--border);
            border-radius:6px; color: var(--text); font-family: var(--mono); font-size:13px;
            padding: 8px 10px; resize:vertical;
        }

        /* status bar — bottom of IDE window, signature detail */
        .statusbar{
            background: var(--bg-elevated);
            border-top: 1px solid var(--border-soft);
            color: var(--text-dim);
            font-family: var(--mono); font-size: 0.72rem; font-weight:600;
            padding: 6px 16px; display:flex; align-items:center; gap: 18px;
        }
        .statusbar span{ display:flex; align-items:center; gap:6px; opacity:0.9; }
        .statusbar .status-dot{ width:6px; height:6px; border-radius:50%; background: var(--accent); }
        .statusbar .push-right{ margin-left:auto; display:flex; gap:18px; }

        /* ============ FRAME TABS (mobile Code / Console switcher) ============ */
        .frame-tabs{ display:none; }


      /* ============ FOOTER (slim) ============ */
        footer{
            background: var(--bg-panel);
            flex: 0 0 auto;
        }

        .footer-slim{
            max-width: 100%;
            margin: 0 auto;
            padding: 10px 1%;
            display:flex;
            align-items:center;
            justify-content:space-between;
            flex-wrap:wrap;
            gap: 14px;
        }

        .footer-brand{
            font-family: var(--mono);
            font-size: 0.85rem;
            font-weight:700;
            color: var(--text-dim);
            display:flex;
            align-items:center;
            gap:7px;
            white-space:nowrap;
        }
        .footer-brand .prompt-symbol{ color: var(--accent); }
        .footer-brand span{ color: var(--text-faint); font-weight:500; }

        .footer-links{
            display:flex;
            align-items:center;
            gap: 20px;
            flex-wrap:wrap;
            list-style:none;
        }

        .footer-links a{
            font-family: var(--sans);
            font-size: 0.83rem;
            font-weight:500;
            color: var(--text-dim);
            text-decoration:none;
            transition: color .15s ease;
        }
        .footer-links a:hover{ color: var(--accent); }

        .footer-copy{
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--text-faint);
            white-space:nowrap;
        }






        /* ============ RESPONSIVE ============ */
        @media (max-width: 900px){
            html, body{ height:auto; }
            body{ min-height: 100vh; overflow: visible; }
            .ide-wrap{ min-height:auto; }
            .workspace-outer{ min-height:auto; flex-direction:column; }
            .ide-window{ min-height:auto; }

            .lang-sidebar{
                width:100%; flex-direction:row; justify-content:flex-start;
                overflow-x:auto; padding: 10px; gap: 10px;
            }
            .lang-sidebar .sidebar-label{ display:none; }
            .lang-icon .lang-tip{ left:50%; top: calc(100% + 8px); transform: translateX(-50%); }

            .frame-tabs{
                display:flex; flex: 0 0 auto; background: var(--bg-elevated);
                border-bottom: 1px solid var(--border-soft);
            }
            .frame-tab{
                flex:1; background:transparent; border:none; color: var(--text-faint);
                font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase;
                padding: 10px 0; cursor:pointer; position:relative; transition: color .15s ease;
            }
            .frame-tab.active{ color: var(--text); }
            .frame-tab.active::after{
                content:""; position:absolute; left:0; right:0; bottom:0; height:2px; background: var(--accent);
            }

            .workspace{
                flex-direction:row; flex-wrap:nowrap; overflow-x:auto;
                scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch;
                min-height: 62vh; scrollbar-width:none;
            }
            .workspace::-webkit-scrollbar{ display:none; }
            .pane{ flex:0 0 100%; width:100%; min-width:100%; scroll-snap-align:start; overflow-y:auto; }
            .pane.left{ border-right:none; }
            .titlebar .run-hint{ display:none; }

            .pane-head{ padding: 8px 10px 8px 14px; }
            .pane-head .status-text{ font-size:0.66rem; }
            .pane-actions .btn{ padding:6px 10px; font-size:0.7rem; }
        }

        @media (max-width: 640px){
            header{ padding: 12px 5%; }
            .header-tag{ display:none; }
            .statusbar{ flex-wrap:wrap; gap:10px; }
            .statusbar .push-right{ margin-left:0; gap:12px; }
            .lang-icon{ width:38px; height:38px; }
            .pane-actions .btn span.btn-label{ display:none; }
            .pane-actions .btn{ padding:6px 9px; }
        }

        @media (prefers-reduced-motion: reduce){
            .pane-head.running .indicator{ animation:none; }
        }
    </style>

                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/ISO_C%2B%2B_Logo.svg/1280px-ISO_C%2B%2B_Logo.svg.png">
                
                </a>
                <a class="lang-icon" href="java.html" title="Online Java Compiler">
                    <img src="https://cdn-icons-png.flaticon.com/512/226/226777.png">
                </a>
                <a class="lang-icon" href="sql.html" style="filter:hue-rotate(30deg);" title="Online SQL Compiler">
                    <img src="https://www.svgrepo.com/show/331760/sql-database-generic.svg">
                </a>
            </aside>

            <!-- ===== Compiler IDE ===== -->
            <div class="ide-window">

                <div class="frame-tabs" role="tablist" aria-label="Switch between code and console">
                    <button class="frame-tab active" data-frame="0" onclick="switchFrame(0)" role="tab" aria-selected="true">◧ Code</button>
                    <button class="frame-tab" data-frame="1" onclick="switchFrame(1)" role="tab" aria-selected="false">◨ Console</button>
                </div>

                <div class="workspace">
                    <div class="pane left">

                        <div class="titlebar">
                            <div class="traffic-lights">
                                <span class="dot red"></span>
                                <span class="dot yellow"></span>
                                <span class="dot green"></span>
                            </div>
                            <div class="file-tab"><span class="dot-mini"></span> <span id="titlebarFile">main.cpp</span></div>
                            <div class="run-hint"><kbd>Ctrl</kbd><span>+</span><kbd>Enter</kbd> to compile &amp; run</div>
                        </div>

                        <div class="file-tabs" role="tablist">
                            <button class="file-tab-btn active"><span class="dot-mini"></span> main.cpp</button>
                        </div>

                        <div class="editor-body">
                            <div class="gutter" id="gutter">1</div>
                            <div class="editor-stack">
                                <textarea autofocus id="cppCode" class="code-pane" spellcheck="false" onkeydown="handleTab(event)" oninput="onEdit()" onscroll="syncGutter(this)">#include <iostream>

int main() {
    std::cout << "Hello, World!" << std::endl;
    return 0;
}</textarea>
                            </div>
                        </div>

                       
                    </div>
                    <div class="pane right">
                        <div class="pane-head" id="consoleHead">
                            <span class="status-text"><span class="indicator"></span> Console</span>
                            <div class="pane-actions">
                                <select class="std-select" id="stdSelect" aria-label="C++ language standard">
                                    <option value="C++11">-std=c++11</option>
                                    <option value="C++14">-std=c++14</option>
                                    <option value="C++17" selected>-std=c++17</option>
                                    <option value="C++20">-std=c++20</option>
                                    <option value="GNU C++">g++ default</option>
                                </select>
                                  <button class="btn btn-clear" onclick="clearCode()" aria-label="Clear editor and console">✕ <span class="btn-label">Clear</span></button>
                             <button class="btn btn-run" id="runBtn" onclick="runCode()" aria-label="Compile and run C++ code">▶ <span class="btn-label">Run</span></button>
                             </div>
                        </div>
                        <div class="console" id="consoleOutput"><span class="line-muted">// Output will appear here after you compile &amp; run.</span></div>
                    <div class="stdin-wrap">
                            <textarea id="stdinBox" spellcheck="false" placeholder="Values your program reads with std::cin / getline() go here, one per line…"></textarea>
                        </div>
                    </div>
                </div>

                <div class="statusbar">
                    <span><span class="status-dot"></span> Ready</span>
                    <span id="stdBadge">-std=c++17</span>
                    <div class="push-right">
                        <span>UTF-8</span>
                        <span id="lineCount">Ln 6</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- ============ FOOTER (slim) ============ -->
     <footer>
        <div class="footer-slim">
            <div class="footer-brand"><span class="prompt-symbol">&gt;_</span> PyCodes<span>.in</span></div>
            <nav class="footer-links" aria-label="Footer">
                <a href="https://pycodes.in/online-compilers">Home</a>
                <a href="https://pycodes.in/blogs">Blogs</a>
                <a href="https://pycodes.in/tutorials">Tutorials</a>
            </nav>

        </div>
    </footer>







    <!-- ============ SCRIPT (unchanged logic — only DOM targets adjusted for the new markup) ============ -->
    <script>
        const cppCode        = document.getElementById("cppCode");
        const gutter         = document.getElementById("gutter");
        const lineCountEl    = document.getElementById("lineCount");
        const consoleHead    = document.getElementById("consoleHead");
        const consoleStatusText = consoleHead.querySelector(".status-text");
        const consoleOutput  = document.getElementById("consoleOutput");
        const runBtn         = document.getElementById("runBtn");
        const stdinBox       = document.getElementById("stdinBox");
        const stdSelect      = document.getElementById("stdSelect");
        const stdBadge       = document.getElementById("stdBadge");

        function updateGutter(){
            const lines = cppCode.value.split("\n").length;
            let out = "";
            for(let i = 1; i <= lines; i++) out += i + "\n";
            gutter.textContent = out;
            lineCountEl.textContent = "Ln " + lines;
        }
        function syncGutter(el){ gutter.scrollTop = el.scrollTop; }
        function onEdit(){ updateGutter(); }

        stdSelect.addEventListener("change", () => {
            const map = {
                "C++11": "-std=c++11",
                "C++14": "-std=c++14",
                "C++17": "-std=c++17",
                "C++20": "-std=c++20",
                "GNU C++": "g++ default"
            };
            stdBadge.textContent = map[stdSelect.value] || stdSelect.value;
        });

        function handleTab(event){
            if(event.key === "Tab"){
                event.preventDefault();
                const el = event.target;
                const start = el.selectionStart;
                const end = el.selectionEnd;
                const value = el.value;
                el.value = value.substring(0, start) + "    " + value.substring(end);
                el.selectionStart = el.selectionEnd = start + 4;
                onEdit();
            }
            if((event.ctrlKey || event.metaKey) && event.key === "Enter"){
                event.preventDefault();
                runCode();
            }
        }

        function escapeHtml(str){
            return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        }

        function setConsole(html){
            consoleOutput.innerHTML = html;
            consoleOutput.scrollTop = 0;
        }

        function setHead(state, label){
            consoleHead.classList.remove("running", "ok", "err");
            if(state) consoleHead.classList.add(state);
            consoleStatusText.innerHTML = '<span class="indicator"></span> ' + label;
        }

        /* ---------- Swipeable Code / Console frames (mobile & tablet) ---------- */
        const workspaceEl = document.querySelector(".workspace");
        const framePanes = document.querySelectorAll(".workspace > .pane");
        const frameTabs = document.querySelectorAll(".frame-tab");

        function switchFrame(index){
            const target = framePanes[index];
            if(!target || !workspaceEl) return;
            workspaceEl.scrollTo({ left: target.offsetLeft, behavior: "smooth" });
        }

        function syncFrameTabs(){
            if(!workspaceEl || workspaceEl.clientWidth === 0) return;
            const idx = Math.round(workspaceEl.scrollLeft / workspaceEl.clientWidth);
            frameTabs.forEach((tab, i) => {
                const isActive = i === idx;
                tab.classList.toggle("active", isActive);
                tab.setAttribute("aria-selected", isActive ? "true" : "false");
            });
        }

        if(workspaceEl){
            let scrollTicking = false;
            workspaceEl.addEventListener("scroll", () => {
                if(!scrollTicking){
                    window.requestAnimationFrame(() => { syncFrameTabs(); scrollTicking = false; });
                    scrollTicking = true;
                }
            });
            window.addEventListener("resize", syncFrameTabs);
        }

        /* ---------- compile & run via Wandbox API ---------- */
        async function runCode(){
            const source = cppCode.value;
            const stdin  = stdinBox.value;

            // Map the selected standard to the raw GCC compiler option
            const stdMap = {
                "C++11": "-std=c++11",
                "C++14": "-std=c++14",
                "C++17": "-std=c++17",
                "C++20": "-std=c++20",
                "GNU C++": ""
            };
            const compilerFlag = stdMap[stdSelect.value] || "-std=c++17";

            if(!source.trim()){
                setHead("err", "Console");
                setConsole('<span class="line-err">error: no source code to compile</span>');
                return;
            }

            runBtn.disabled = true;
            setHead("running", "Compiling…");
            setConsole('<span class="line-muted">Sending to compiler backend (Wandbox)...</span>');
            if(window.innerWidth <= 900){ switchFrame(1); }

            try{
                // Switched to Wandbox API as Piston API now restricts public access
                const response = await fetch("https://wandbox.org/api/compile.json", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        compiler: "gcc-head", // Target the latest GCC version natively
                        code: source,
                        stdin: stdin,
                        "compiler-option-raw": compilerFlag
                    })
                });

                if(!response.ok){
                    setHead("err", "Console");
                    setConsole('<span class="line-err">Compiler service returned an error (HTTP ' + response.status + '). Please try again.</span>');
                    runBtn.disabled = false;
                    return;
                }

                const data = await response.json();
                let html = "";

                // Wandbox uses "0" for success, non-zero for failures
                const isError = data.status !== "0";
                setHead(isError ? "err" : "ok", "Console");

                // Display compiler errors/warnings
                if (data.compiler_error && data.compiler_error.trim()) {
                    html += '<span class="line-err">' + escapeHtml(data.compiler_error.trim()) + '</span>\n\n';
                }

                // Display runtime errors (like segfaults)
                if (data.program_error && data.program_error.trim()) {
                    html += '<span class="line-err">' + escapeHtml(data.program_error.trim()) + '</span>\n\n';
                }

                // Display standard output
                if (data.program_message) {
                    html += '<span class="line-out">' + escapeHtml(data.program_message) + '</span>';
                }

                // Handle cases where the program ran successfully but printed nothing
                if (!data.program_message && !data.program_error && !data.compiler_error) {
                    html += '<span class="line-muted">(program produced no output)</span>';
                }

                html += '<div class="exit-code">process exited with code ' + (data.status || "0") + '</div>';

                setConsole(html);

            }catch(err){
                setHead("err", "Console");
                setConsole('<span class="line-err">network error — could not reach the compiler service. Please check your connection and try again.</span>');
            }finally{
                runBtn.disabled = false;
            }
        }

        function clearCode(){
            cppCode.value = "";
            stdinBox.value = "";
            updateGutter();
            setHead(null, "Console");
            setConsole('<span class="line-muted">// Output will appear here after you compile &amp; run.</span>');
        }

        updateGutter();
    </script>
</body>
