    <style>
        :root{
            /* ---- Color tokens (matches PyCodes.in HTML compiler theme) ---- */
            --bg:            #0a0e14;
            --bg-panel:      #10151c;
            --bg-elevated:   #161c25;
            --bg-input:      #0d1117;
            --border:        #232b36;
            --border-soft:   #1b212b;
            --text:          #e6edf3;
            --text-dim:      #8b98a5;
            --text-faint:    #5b6774;
            --accent:        crimson;
            --accent-dim:    crimson;
            --accent2:       crimson;
            --danger:        crimson;
            --warn:          #d29922;
            --ok:            #3fb950;

            --mono: 'JetBrains Mono', 'Consolas', monospace;
            --sans: 'Inter', system-ui, sans-serif;

            --radius: 8px;
        }

        *{ margin:0; padding:0; box-sizing:border-box; }

        html{ scroll-behavior:smooth; }

        body{
            background:
                radial-gradient(ellipse 900px 500px at 15% -10%, rgba(126,231,135,0.06), transparent),
                radial-gradient(ellipse 700px 500px at 100% 0%, rgba(88,166,255,0.05), transparent),
                var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            display:flex;
            flex-direction:column;
        }

        a{ color: inherit; }

        ::selection{ background: var(--accent-dim); color:#fff; }

        ::-webkit-scrollbar{ width:10px; height:10px; }
        ::-webkit-scrollbar-track{ background: var(--bg-panel); }
        ::-webkit-scrollbar-thumb{ background: var(--border); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover{ background: var(--text-faint); }

        /* ============ HEADER (slim) ============ */
        header{
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 14px 1%;
            display:flex;
            align-items:center;
            justify-content:space-between;
            flex: 0 0 auto;
            z-index: 50;
        }

        .logo{ display:flex; align-items:center; gap:10px; text-decoration:none; }

        .logo .prompt-symbol{
            font-family: var(--mono);
            color: var(--accent);
            font-weight:700;
            font-size:1.5rem;
        }

        .logo .brand{
            font-family: var(--mono);
            font-size: 1.25rem;
            font-weight:700;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .logo .brand span{ color: var(--text-dim); font-weight:500; }

        .header-right{ display:flex; align-items:center; gap:22px; }

        nav{ display:flex; align-items:center; gap:22px; }

        nav a{
            text-decoration:none;
            color: var(--text-dim);
            font-size:0.9rem;
            font-weight:500;
            transition: color .15s ease;
            position:relative;
            white-space:nowrap;
        }
        nav a::before{
            content:"#";
            color: var(--accent);
            margin-right:5px;
            font-family: var(--mono);
            opacity:0;
            transition: opacity .15s ease;
        }
        nav a:hover{ color: var(--text); }
        nav a:hover::before{ opacity:1; }
        nav a[aria-current="page"]{ color: var(--accent); }

        header .header-tag{
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--text-faint);
            border: 1px solid var(--border);
            border-radius: 0px;
            padding: 5px 12px;
            display:flex;
            align-items:center;
            gap:7px;
            white-space:nowrap;
        }
        header .header-tag .status-dot{
            width:6px; height:6px; border-radius:50%;
            background: var(--accent);
        }

        /* ============ MAIN LAYOUT ============ */
        .ide-wrap{
            padding:0 0%;
            flex:1;
            display:flex;
            flex-direction:column;
        }

        .workspace-outer{
            display:flex;
            gap: 0px;
            flex:1;
            align-items: stretch;
        }

        /* ============ LANGUAGE SIDEBAR ============ */
        .lang-sidebar{
            width: 40px;
            flex: 0 0 50px;
            background: var(--bg-panel);
            border-radius: 0px;
            padding: 14px 0px;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap: 10px;
        }

        .lang-sidebar .sidebar-label{
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-faint);
            margin-bottom: 4px;
            text-align:center;
        }

        .lang-icon{
            position: relative;
            width: 40px;
            height: 40px;
            border-radius: 0px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-family: var(--mono);
            font-weight: 700;
            font-size: 28px;
            text-decoration:none;
            cursor:pointer;
            transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
            flex-shrink:0;
        }
        .lang-icon:hover{ transform: translateY(-2px); border-color: var(--text-faint); }
        .lang-icon.active{
            border:1px solid #333;
        }
        .lang-icon.soon{ opacity:0.4; cursor:not-allowed; }
        .lang-icon.soon:hover{ transform:none; border-color: var(--border-soft); }

        .lang-icon img{
            height:25px;
            width:25px;
        }

        /* ============ IDE WINDOW (flat) ============ */
        .ide-window{
            background: var(--bg-panel);
            border: 1px solid var(--border);
            overflow:hidden;
            display:flex;
            flex-direction:column;
            flex:1;
            min-width:0;
        }

        .titlebar{
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border);
            padding: 5px 16px;
            display:flex;
            align-items:center;
            gap: 14px;
        }

        .traffic-lights{ display:flex; gap:7px; }
        .dot{ width:11px; height:11px; border-radius:50%; }
        .dot.red{ background:#f85149; }
        .dot.yellow{ background:#d29922; }
        .dot.green{ background:#3fb950; }

        .file-tab{
            font-family: var(--mono);
            font-size: 0.82rem;
            color: var(--text-dim);
            background: var(--bg-panel);
            border: 1px solid var(--border-soft);
            padding: 5px 12px;
            border-radius: 6px;
            display:flex;
            align-items:center;
            gap:7px;
        }

        .file-tab .dot-mini{
            width:6px; height:6px; border-radius:50%;
            background: var(--accent);
        }

        .titlebar .run-hint{
            margin-left:auto;
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--text-faint);
            display:flex;
            gap:6px;
        }

        kbd{
            font-family: var(--mono);
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-bottom-width:2px;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.72rem;
            color: var(--text-dim);
        }

        .btn{
            font-family: var(--sans);
            font-weight:600;
            font-size: 0.88rem;
            border:none;
            border-radius: 6px;
            padding: 9px 20px;
            cursor:pointer;
            display:inline-flex;
            align-items:center;
            gap:8px;
            transition: transform .12s ease, box-shadow .12s ease, background .15s ease, opacity .12s ease;
            text-transform:none;
            letter-spacing:normal;
            margin-bottom: 0;
        }

        .pane-actions .btn{
            padding: 6px 13px;
            font-size: 0.74rem;
            border-radius: 5px;
            gap:6px;
        }

        .btn-run{
            background: var(--accent);
            color: #05170c;
            box-shadow: 0 0 0 1px var(--accent-dim);
        }
        .btn-run:hover{ transform: translateY(-1px); box-shadow: 0 0 0 1px var(--accent-dim), 0 6px 16px -6px tomato; }
        .btn-run:active{ transform: translateY(0); }

        .btn-clear{
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
        }
        .btn-clear:hover{ color: var(--text); border-color: var(--text-faint); }

        /* ============ WORKSPACE (editor / results panes) ============ */
        .workspace{
            display:flex;
            flex:1;
            min-height: 460px;
        }

        .pane{
            flex:1;
            display:flex;
            flex-direction:column;
            min-width:0;
        }

        .pane.left{ border-right: 1px solid var(--border-soft); }

        .editor-body{
            flex:1;
            position:relative;
            display:flex;
            min-height:0;
        }

        .gutter{
            display:none;
            width: 46px;
            background: var(--bg-input);
            color: var(--text-faint);
            font-family: var(--mono);
            font-size: 14px;
            line-height: 1.65;
            text-align:right;
            padding: 16px 10px 16px 0;
            user-select:none;
            border-right: 1px solid var(--border-soft);
            overflow:hidden;
            flex-shrink:0;
        }

        .editor-stack{ flex:1; position:relative; min-width:0; }

        textarea{
            background: var(--bg-input);
            color: var(--text);
            font-family: var(--mono);
            font-size: 14px;
            line-height: 1.65;
            padding: 16px;
            border:none;
            outline:none;
            resize:none;
            caret-color: var(--accent);
            tab-size: 2;
        }

        textarea.code-pane{
            position:absolute;
            inset:0;
            width:100%;
            height:100%;
        }

        /* ---- console-style pane head ---- */
        .pane-head{
            padding: 6px 8px 3px 16px;
            font-family: var(--mono);
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-faint);
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:12px;
            flex-wrap:wrap;
            row-gap:6px;
            border-bottom: 1px solid var(--border-soft);
            background: var(--bg-elevated);
        }

        .pane-head .status-text{
            display:flex;
            align-items:center;
            gap:8px;
            white-space:nowrap;
        }

        .pane-head .indicator{
            width:6px; height:6px; border-radius:50%;
            background: var(--text-faint);
            flex-shrink:0;
        }
        .pane-head.running .indicator{ background: var(--warn); animation: pulse 0.8s infinite; }
        .pane-head.ok .indicator{ background: var(--accent); }
        .pane-head.err .indicator{ background: var(--danger); }

        @keyframes pulse{ 50%{ opacity:0.35; } }

        .pane-actions{
            display:flex;
            align-items:center;
            gap:10px;
            flex-shrink:0;
            flex-wrap:wrap;
        }

        /* ---- SQL results table ---- */
        .result-pane{
            flex:1;
            background: var(--bg-input);
            overflow:auto;
            padding: 16px;
            font-family: var(--sans);
        }
        .sql-table{
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.85rem;
        }
        .sql-table th, .sql-table td{
            border: 1px solid var(--border-soft);
            padding: 8px 12px;
            text-align: left;
        }
        .sql-table th{
            background: var(--bg-elevated);
            color: var(--accent);
            font-family: var(--mono);
            font-weight:600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.75rem;
        }
        .sql-table tr:nth-child(even){ background: rgba(255,255,255,0.02); }
        .sql-table tr:hover{ background: rgba(255,255,255,0.05); }

        .msg-error{
            color: var(--danger);
            font-family: var(--mono);
            font-size: 0.85rem;
            background: rgba(248, 81, 73, 0.1);
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid var(--danger);
        }
        .msg-success{ color: var(--ok); font-family: var(--mono); font-size: 0.85rem; margin-bottom:10px; }
        .msg-muted{ color: var(--text-faint); font-family: var(--mono); font-size: 0.85rem; }

        /* status bar — bottom of IDE window */
        .statusbar{
            background: var(--bg-elevated);
            border-top: 1px solid var(--border-soft);
            color: var(--text-dim);
            font-family: var(--mono);
            font-size: 0.72rem;
            font-weight:600;
            padding: 6px 16px;
            display:flex;
            align-items:center;
            gap: 18px;
        }
        .statusbar span{ display:flex; align-items:center; gap:6px; opacity:0.9; }
        .statusbar .status-dot{ width:6px; height:6px; border-radius:50%; background: var(--accent); }
        .statusbar .push-right{ margin-left:auto; display:flex; gap:18px; }

        /* ============ FRAME TABS (mobile Query / Results switcher) ============ */
        .frame-tabs{ display:none; }

        /* ============ FOOTER (slim) ============ */
        footer{
            background: var(--bg-panel);
            flex: 0 0 auto;
        }

        .footer-slim{
            max-width: 100%;
            margin: 0 auto;
            padding: 10px 1%;
            display:flex;
            align-items:center;
            justify-content:space-between;
            flex-wrap:wrap;
            gap: 14px;
        }

        .footer-brand{
            font-family: var(--mono);
            font-size: 0.85rem;
            font-weight:700;
            color: var(--text-dim);
            display:flex;
            align-items:center;
            gap:7px;
            white-space:nowrap;
        }
        .footer-brand .prompt-symbol{ color: var(--accent); }
        .footer-brand span{ color: var(--text-faint); font-weight:500; }

        .footer-links{
            display:flex;
            align-items:center;
            gap: 20px;
            flex-wrap:wrap;
            list-style:none;
        }

        .footer-links a{
            font-family: var(--sans);
            font-size: 0.83rem;
            font-weight:500;
            color: var(--text-dim);
            text-decoration:none;
            transition: color .15s ease;
        }
        .footer-links a:hover{ color: var(--accent); }

        .footer-copy{
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--text-faint);
            white-space:nowrap;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 900px){
            .ide-wrap{ padding: 0; }
            .workspace-outer{ flex-direction:column; }
            .lang-sidebar{
                width:100%;
                flex-direction:row;
                justify-content:flex-start;
                overflow-x:auto;
                padding: 10px;
                gap: 10px;
            }
            .lang-sidebar .sidebar-label{ display:none; }
            .lang-icon .lang-tip{
                left:50%;
                top: calc(100% + 8px);
                transform: translateX(-50%);
            }

            .frame-tabs{
                display:flex;
                flex: 0 0 auto;
                background: var(--bg-elevated);
                border-bottom: 1px solid var(--border-soft);
            }
            .frame-tab{
                flex:1;
                background:transparent;
                border:none;
                color: var(--text-faint);
                font-family: var(--mono);
                font-size: 0.72rem;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                padding: 10px 0;
                cursor:pointer;
                position:relative;
                transition: color .15s ease;
            }
            .frame-tab.active{ color: var(--text); }
            .frame-tab.active::after{
                content:"";
                position:absolute;
                left:0; right:0; bottom:0;
                height:2px;
                background: var(--accent);
            }

            .workspace{
                flex-direction:row;
                flex-wrap:nowrap;
                overflow-x:auto;
                scroll-snap-type:x mandatory;
                -webkit-overflow-scrolling:touch;
                min-height: 62vh;
                scrollbar-width:none;
            }
            .workspace::-webkit-scrollbar{ display:none; }

            .pane{
                flex:0 0 100%;
                width:100%;
                min-width:100%;
                scroll-snap-align:start;
            }
            .pane.left{ border-right:none; }
            .titlebar .run-hint{ display:none; }

            .pane-head{ padding: 8px 10px 8px 14px; }
            .pane-head .status-text{ font-size:0.66rem; }
            .pane-actions .btn{ padding:6px 10px; font-size:0.7rem; }

            nav{ display:none; }
        }

        @media (max-width: 640px){
            header{ padding: 12px 5%; }
            .header-tag{ display:none; }
            .statusbar{ flex-wrap:wrap; gap:10px; }
            .statusbar .push-right{ margin-left:0; gap:12px; }
            .lang-icon{ width:38px; height:38px; }
            .pane-actions .btn span.btn-label{ display:none; }
            .pane-actions .btn{ padding:6px 9px; }
            .footer-slim{ flex-direction:column; align-items:flex-start; }
        }

        @media (prefers-reduced-motion: reduce){
            .pane-head.running .indicator{ animation:none; }
        }
    </style>
</head>

        </div>
    </noscript>

    <main class="ide-wrap" id="compiler">
        <div class="workspace-outer">

            <aside class="lang-sidebar" aria-label="Other language compilers">
                <span class="sidebar-label"></span>

                <a class="lang-icon" href="python.html" title="Online Python Compiler">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Python-logo-notext.svg/3840px-Python-logo-notext.svg.png" alt="Python Compiler">
                </a>
                <a class="lang-icon" href="html.html" title="Online HTML, CSS & JS Compiler">

                </a>
                <a class="lang-icon" href="C.html" title="Online C Compiler">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/C_Programming_Language.svg/1920px-C_Programming_Language.svg.png" alt="C Compiler">
                </a>
                <a class="lang-icon" href="C++.html" title="Online C++ Compiler">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/ISO_C%2B%2B_Logo.svg/1280px-ISO_C%2B%2B_Logo.svg.png" alt="C++ Compiler">
                </a>
                <a class="lang-icon" href="java.html" title="Online Java Compiler">
                    <img src="https://cdn-icons-png.flaticon.com/512/226/226777.png" alt="Java Compiler">
                </a>
                <a class="lang-icon active" href="sql.html" style="filter:hue-rotate(30deg);" title="Online SQL Compiler">
                    <img src="https://www.svgrepo.com/show/331760/sql-database-generic.svg" alt="SQL Compiler">
                </a>
            </aside>

            <div class="ide-window">

                <div class="frame-tabs" role="tablist" aria-label="Switch between query and results">
                    <button class="frame-tab active" data-frame="0" onclick="switchFrame(0)" role="tab" aria-selected="true">◧ Query</button>
                    <button class="frame-tab" data-frame="1" onclick="switchFrame(1)" role="tab" aria-selected="false">◨ Results</button>
                </div>

                <div class="workspace">
                    <div class="pane left">

                        <div class="titlebar">
                            <div class="traffic-lights">
                                <span class="dot red"></span>
                                <span class="dot yellow"></span>
                                <span class="dot green"></span>
                            </div>
                            <div class="file-tab"><span class="dot-mini"></span> query.sql</div>
                            <div class="run-hint"><kbd>Ctrl</kbd><span>+</span><kbd>Enter</kbd> to run query</div>
                        </div>

                        <div class="editor-body">
                            <div class="gutter" id="gutter">1</div>
                            <div class="editor-stack">
                                <textarea autofocus id="sqlCode" class="code-pane" spellcheck="false" aria-label="SQL query editor" onkeydown="handleKey(event)" oninput="updateGutter()">CREATE TABLE my_projects (
    id INTEGER PRIMARY KEY,
    name TEXT,
    status TEXT
);
</textarea>
                            </div>
                        </div>
                    </div>

                    <div class="pane right">
                        <div class="pane-head" id="resultsHead">
                            <span class="status-text"><span class="indicator"></span> Results</span>
                            <div class="pane-actions">
                                <button class="btn btn-clear" onclick="resetDatabase()" aria-label="Clear database">↻ <span class="btn-label">Clear DB</span></button>
                                <label class="btn btn-clear" style="cursor:pointer;">
                                     <span class="btn-label">Load DB</span>
                                    <input type="file" id="uploadDb" accept=".sqlite,.db,.sqlite3" style="display:none;" onchange="importDatabase(event)">
                                </label>
                                <button class="btn btn-clear" onclick="exportDatabase()" aria-label="Save database"> <span class="btn-label">Save DB</span></button>
                                <button class="btn btn-run" onclick="executeSQL()" aria-label="Run SQL query">▶ <span class="btn-label">Run</span></button>
                            </div>
                        </div>
                        <div class="result-pane" id="output">
                            <p class="msg-muted">Initializing SQLite Database engine...</p>
                        </div>
                    </div>
                </div>

                <div class="statusbar">
                    <span><span class="status-dot"></span> <span id="dbStatus">Loading WASM...</span></span>
                    <span>SQLite 3.39</span>
                    <div class="push-right">
                        <span>UTF-8</span>
                        <span id="lineCount">Ln 5</span>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer>
        <div class="footer-slim">
            <div class="footer-brand"><span class="prompt-symbol">&gt;_</span> PyCodes<span>.in</span></div>
            <nav class="footer-links" aria-label="Footer">
                <a href="index.html">Home</a>
                <a href="tools.html">Tools</a>
                <a href="tutorials.html">Tutorials</a>
            </nav>
        </div>
    </footer>

    <script>
        const sqlCode      = document.getElementById("sqlCode");
        const gutter       = document.getElementById("gutter");
        const lineCountEl  = document.getElementById("lineCount");
        const output       = document.getElementById("output");
        const dbStatus     = document.getElementById("dbStatus");
        const headerStatus = document.getElementById("headerStatusText");
        const resultsHead  = document.getElementById("resultsHead");
        const resultsStatusText = resultsHead.querySelector(".status-text");

        let db = null;
        let SQL = null;

        /* ---------- line count (mirrors the HTML compiler's status bar counter) ---------- */
        function updateGutter(){
            const lines = sqlCode.value.split("\n").length;
            lineCountEl.textContent = "Ln " + lines;
        }
        updateGutter();

        /* ---------- Ctrl+Enter to run ---------- */
        function handleKey(e){
            if((e.ctrlKey || e.metaKey) && e.key === "Enter"){
                e.preventDefault();
                executeSQL();
            }
        }

        function setResultsState(state, label){
            resultsHead.classList.remove("running", "ok", "err");
            resultsHead.classList.add(state);
            resultsStatusText.innerHTML = '<span class="indicator"></span> ' + label;
        }

        /* ---------- Initialize SQL.js ---------- */
        async function initDB(){
            try{
                SQL = await initSqlJs({
                    locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}`
                });
                resetDatabase(false);
            }catch(err){
                dbStatus.innerText = "Initialization Failed";
                headerStatus.textContent = "Error";
                setResultsState("err", "Error");
                output.innerHTML = `<div class="msg-error">Failed to load SQLite Engine. Check network connection.</div>`;
            }
        }

        /* ---------- Reset to a fresh empty database ---------- */
        function resetDatabase(showMsg = true){
            if(!SQL) return;
            db = new SQL.Database();
            dbStatus.innerText = "Empty DB Ready";
            headerStatus.textContent = "Ready";
            setResultsState("ok", "Results");
            if(showMsg){
                output.innerHTML = `<div class="msg-success">✓ Database cleared. You are now working with a fresh, empty database.</div>`;
            }else{
                output.innerHTML = `<div class="msg-success">✓ Engine loaded. Ready to execute queries.</div>`;
            }
            document.getElementById("uploadDb").value = "";
        }

        /* ---------- Export (download) database ---------- */
        function exportDatabase(){
            if(!db){
                setResultsState("err", "Error");
                output.innerHTML = `<div class="msg-error">No database exists to save.</div>`;
                return;
            }
            const data = db.export();
            if(data.length === 0){
                setResultsState("err", "Error");
                output.innerHTML = `<div class="msg-error">Database is entirely empty. Create tables before saving.</div>`;
                return;
            }
            const blob = new Blob([data], { type: "application/x-sqlite3" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "my_database.sqlite";
            a.click();
            window.URL.revokeObjectURL(url);

            setResultsState("ok", "Results");
            output.innerHTML = `<div class="msg-success">✓ Database successfully saved to your system as 'my_database.sqlite'.</div>`;
        }

        /* ---------- Import (upload) database ---------- */
        function importDatabase(event){
            const file = event.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = function(){
                try{
                    const Uints = new Uint8Array(reader.result);
                    db = new SQL.Database(Uints);

                    dbStatus.innerText = "Custom DB Loaded";
                    headerStatus.textContent = "Ready";
                    setResultsState("ok", "Results");
                    output.innerHTML = `<div class="msg-success">✓ Database '${file.name}' loaded successfully!<br>You can now run SELECT queries to view your tables.</div>`;

                    event.target.value = "";
                }catch(err){
                    setResultsState("err", "Error");
                    output.innerHTML = `<div class="msg-error">Failed to load database. Make sure it is a valid SQLite file.</div>`;
                }
            };
            reader.readAsArrayBuffer(file);
        }

        /* ---------- Execute query and render results table ---------- */
        function executeSQL(){
            if(!db){
                setResultsState("err", "Error");
                output.innerHTML = `<div class="msg-error">Database is not ready yet.</div>`;
                return;
            }

            const query = sqlCode.value.trim();
            if(!query) return;

            setResultsState("running", "Running…");
            if(window.innerWidth <= 900){ switchFrame(1); }

            try{
                const results = db.exec(query);

                if(results.length === 0){
                    setResultsState("ok", "Results");
                    output.innerHTML = `<div class="msg-success">✓ Query executed successfully. (0 rows returned to display)</div>`;
                    return;
                }

                let html = `<div class="msg-success">✓ Query executed successfully.</div>`;

                results.forEach(resultSet => {
                    html += `<table class="sql-table"><thead><tr>`;
                    resultSet.columns.forEach(col => { html += `<th>${col}</th>`; });
                    html += `</tr></thead><tbody>`;

                    resultSet.values.forEach(row => {
                        html += `<tr>`;
                        row.forEach(val => {
                            html += `<td>${val !== null ? val : '<em>NULL</em>'}</td>`;
                        });
                        html += `</tr>`;
                    });

                    html += `</tbody></table><br>`;
                });

                output.innerHTML = html;
                setResultsState("ok", "Results");

            }catch(err){
                setResultsState("err", "Error");
                output.innerHTML = `<div class="msg-error"><b>Syntax Error or Execution Failed:</b><br>${err.message}</div>`;
            }
        }

        /* ---------- Swipeable Query / Results frames (mobile & tablet) ---------- */
        const workspaceEl = document.querySelector(".workspace");
        const framePanes  = document.querySelectorAll(".workspace > .pane");
        const frameTabs   = document.querySelectorAll(".frame-tab");

        function switchFrame(index){
            const target = framePanes[index];
            if(!target || !workspaceEl) return;
            workspaceEl.scrollTo({ left: target.offsetLeft, behavior: "smooth" });
        }

        function syncFrameTabs(){
            if(!workspaceEl || workspaceEl.clientWidth === 0) return;
            const idx = Math.round(workspaceEl.scrollLeft / workspaceEl.clientWidth);
            frameTabs.forEach((tab, i) => {
                const isActive = i === idx;
                tab.classList.toggle("active", isActive);
                tab.setAttribute("aria-selected", isActive ? "true" : "false");
            });
        }

        if(workspaceEl){
            let scrollTicking = false;
            workspaceEl.addEventListener("scroll", () => {
                if(!scrollTicking){
                    window.requestAnimationFrame(() => { syncFrameTabs(); scrollTicking = false; });
                    scrollTicking = true;
                }
            });
            window.addEventListener("resize", syncFrameTabs);
        }

        initDB();
    </script>
</body>
</html>
