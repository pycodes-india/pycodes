<style>
  /* Strict White Theme with Vibrant VIBGYOR Accents */
  :root {
    --bg: #F0F2F5;
    --elev: #FFFFFF;
    --elev-2: #F8FAFC; 
    --border: #E5E7EB; 
    --text: #111827; 
    --text-dim: #6B7280; 
    
    /* VIBGYOR Solid Colors */
    --v-violet: #8B5CF6;
    --v-indigo: #6366F1;
    --v-blue: #3B82F6;
    --v-green: #10B981;
    --v-yellow: #F59E0B;
    --v-orange: #F97316;
    --v-red: #EF4444;
  }
  
  body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg);
    color: var(--text);
  }

  .font-mono {
    font-family: 'Fira Code', monospace;
  }

  /* Custom Scrollbar */
  * { scrollbar-width: thin; scrollbar-color: #CBD5E1 transparent; }
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }

  /* UI Elements */
  .color-card {
    border-radius: 16px;
    color: #FFFFFF;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .color-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
  }

  .white-card {
    background: var(--elev);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
  }

  .rainbow-bar {
    height: 6px;
    background: linear-gradient(90deg, var(--v-violet), var(--v-indigo), var(--v-blue), var(--v-green), var(--v-yellow), var(--v-orange), var(--v-red));
  }

  @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .pulse { animation: pulse-soft 2s infinite; }
  
  .chapter-row { transition: all 0.2s ease; border-radius: 12px; margin-bottom: 4px; border: 1px solid transparent; }
  .chapter-row:not(.locked):hover { background: var(--elev-2); border-color: var(--border); cursor: pointer; transform: translateX(4px); }
  .chapter-row.selected { background: var(--v-indigo); color: white; box-shadow: 0 4px 10px rgba(99,102,241,0.3); }
  .chapter-row.selected .text-dim-target { color: rgba(255,255,255,0.8) !important; }
  .chapter-row.locked { opacity: 0.5; cursor: not-allowed; }

  /* Buttons */
  .solid-btn {
    border-radius: 12px;
    font-weight: 700;
    transition: all 0.2s ease;
    border: none;
    cursor: pointer;
  }
  .solid-btn:active:not(:disabled) { transform: scale(0.96); }
  
  .timer-btn {
    background: var(--elev-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .timer-btn:hover { background: #E2E8F0; color: var(--text); }
  .timer-btn.active { background: var(--v-blue); color: white; border-color: var(--v-blue); box-shadow: 0 4px 10px rgba(59,130,246,0.3); }

  .btn-primary {
    background: var(--v-violet);
    color: white;
    box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
  }
  .btn-primary:hover:not(:disabled) { background: #7C3AED; box-shadow: 0 6px 16px rgba(139, 92, 246, 0.5); }
  .btn-primary:disabled { background: #D1D5DB; box-shadow: none; cursor: not-allowed; }
</style>

<script>
(function(){
  'use strict';

  // REPLACE THIS WITH YOUR ACTUAL GOOGLE SHEETS CSV LINK
  var SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTTpRaHoIqCMFwkZVjprUwo1Do032kP6Nx7R0ILNZm3Lkb_MpWceUoIqv-6ciuTxJn86sY2-huuYMXn/pub?output=csv';

  // Empty array that will be filled by PapaParse
  var CHAPTERS = [];

  var STORAGE_KEY = 'TypingWorld_vibrant_v1';
  var state = loadState();
  var selectedChapterId = 1;
  var activePopup = null;
  var liveData = null;
  var popupWatcherInterval = null;

  function defaultState(){
    return { settings:{ soundEnabled:true, timerDuration:60 }, completed:{}, history:[] };
  }
  function loadState(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        var parsed = JSON.parse(raw);
        var d = defaultState();
        return { settings: Object.assign(d.settings, parsed.settings || {}), completed: parsed.completed || {}, history: parsed.history || [] };
      }
    }catch(e){}
    return defaultState();
  }
  function saveState(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){} }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; });
  }

  function isUnlocked(id){ return id===1 || !!state.completed[id-1]; }
  function wordCount(text){ return text.trim().split(/\s+/).length; }

  function applySoundIcon(){
    var btn = document.getElementById('soundToggle');
    btn.innerHTML = state.settings.soundEnabled ? '<i class="fa-solid fa-volume-high"></i>' : '<i class="fa-solid fa-volume-xmark"></i>';
    btn.style.backgroundColor = state.settings.soundEnabled ? 'var(--v-green)' : 'var(--v-orange)';
  }

  function renderLifetimeStats(){
    var completedCount = Object.keys(state.completed).length;
    var allWpm = state.history.map(function(h){ return h.wpm; });
    var bestWpm = allWpm.length ? Math.max.apply(null, allWpm) : 0;
    var avgAcc = state.history.length ? Math.round(state.history.reduce(function(a,h){ return a+h.accuracy; },0) / state.history.length) : 0;
    var totalSessions = state.history.length;

    var items = [
      {label:'Completed', value: completedCount + '/' + Math.max(1, CHAPTERS.length), color: 'var(--v-violet)', icon:'fa-book-open'},
      {label:'Top Speed', value: bestWpm, suffix:'WPM', color: 'var(--v-blue)', icon:'fa-bolt'},
      {label:'Avg Accuracy', value: avgAcc+'%', color: 'var(--v-green)', icon:'fa-crosshairs'},
      {label:'Total Sessions', value: totalSessions, color: 'var(--v-orange)', icon:'fa-stopwatch'}
    ];

    document.getElementById('lifetimeStats').innerHTML = items.map(function(it){
      return '<div class="color-card p-5 flex items-center gap-5" style="background-color: '+it.color+';">' +
        '<div class="w-14 h-14 bg-white/20 rounded-full flex items-center justify-center text-2xl shadow-inner">' +
          '<i class="fa-solid '+it.icon+'"></i>' +
        '</div>' +
        '<div>' +
          '<div class="text-[11px] font-bold uppercase tracking-widest text-white/80 mb-1">'+it.label+'</div>' +
          '<div class="text-3xl font-black font-mono leading-none">'+it.value+' <span class="text-sm font-bold text-white/70">'+(it.suffix||'')+'</span></div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function renderSidebar(){
    var html = CHAPTERS.map(renderChapterRow).join('');
    document.getElementById('chapterList').innerHTML = html;

    document.querySelectorAll('.chapter-row').forEach(function(row){
      row.addEventListener('click', function(){
        var id = parseInt(row.dataset.id, 10);
        if(!isUnlocked(id)) return;
        selectedChapterId = id;
        renderSidebar();
        renderMainPanel();
        closeSidebarMobile();
      });
    });
  }

  function renderChapterRow(c){
    var unlocked = isUnlocked(c.id);
    var done = state.completed[c.id];
    var selected = c.id === selectedChapterId;
    
    var icon = unlocked ? (done ? '<i class="fa-solid fa-check-circle text-white"></i>' : '<i class="fa-solid fa-play-circle text-white"></i>') : '<i class="fa-solid fa-lock text-[var(--text-dim)]"></i>';
    var iconBg = unlocked ? (done ? 'var(--v-green)' : 'var(--v-blue)') : 'var(--elev-2)';

    return '<div data-id="'+c.id+'" class="chapter-row '+(selected?'selected ':'')+(!unlocked?'locked ':'')+'flex items-center gap-3 p-2.5" role="button" tabindex="0">' +
      '<div class="w-8 h-8 rounded-full flex items-center justify-center shadow-sm" style="background-color:'+iconBg+';">' + icon + '</div>' +
      '<div class="flex-1 min-w-0">' +
        '<div class="text-sm font-bold truncate '+(selected?'text-white':'text-[var(--text)]')+'">'+c.id+'. '+escapeHtml(c.title)+'</div>' +
        (done
          ? '<div class="text-[11px] font-bold text-dim-target '+(selected?'text-white':'text-[var(--v-green)]')+'">Best: '+done.bestWpm+' WPM</div>'
          : '<div class="text-[11px] font-semibold text-dim-target text-[var(--text-dim)]">'+wordCount(c.text)+' words</div>') +
      '</div>' +
    '</div>';
  }

  function renderMainPanel(){
    var c = CHAPTERS.find(function(x){ return x.id===selectedChapterId; });
    if(!c) return;
    
    var unlocked = isUnlocked(c.id);
    var done = state.completed[c.id];

    var html = '';

    html += '<section class="white-card p-6 md:p-8 relative overflow-hidden">';
    html += '<div class="absolute top-0 left-0 w-full h-2" style="background-color: var(--v-indigo);"></div>';
    
    html += '<div class="flex items-center justify-between mb-4">';
    html += '<span class="inline-block px-3 py-1 rounded-full text-white text-[11px] font-bold uppercase shadow-sm" style="background-color: var(--v-indigo);">Typing Drill</span>';
    if(!unlocked) html += '<span class="text-[11px] px-3 py-1 rounded-full bg-[var(--v-red)] text-white font-bold shadow-sm"><i class="fa-solid fa-lock"></i> Locked</span>';
    html += '</div>';
    
    html += '<h2 class="text-3xl font-black mb-6 text-[var(--text)]">'+escapeHtml(c.title)+'</h2>';
    
    html += '<div class="bg-[var(--elev-2)] border border-[var(--border)] rounded-2xl p-6 font-mono text-[16px] leading-relaxed text-[var(--text-dim)] max-h-[160px] overflow-y-auto shadow-inner">';
    html += escapeHtml(c.text);
    html += '</div>';
    
    html += '<div class="flex gap-4 mt-6">';
    if(done){
      html += '<div class="color-card flex-1 p-4 text-center" style="background-color: var(--v-blue);"><div class="text-2xl font-black">'+done.bestWpm+'</div><div class="text-[10px] uppercase font-bold text-white/80">Best WPM</div></div>';
      html += '<div class="color-card flex-1 p-4 text-center" style="background-color: var(--v-indigo);"><div class="text-2xl font-black">'+done.bestNet+'</div><div class="text-[10px] uppercase font-bold text-white/80">Net WPM</div></div>';
      html += '<div class="color-card flex-1 p-4 text-center" style="background-color: var(--v-green);"><div class="text-2xl font-black">'+done.bestAccuracy+'%</div><div class="text-[10px] uppercase font-bold text-white/80">Accuracy</div></div>';
    } else {
      html += '<div class="bg-[var(--elev-2)] border border-[var(--border)] rounded-xl px-4 py-2 text-xs font-bold text-[var(--text-dim)]"><i class="fa-solid fa-align-left text-[var(--v-blue)] mr-1"></i> '+wordCount(c.text)+' words</div>';
      html += '<div class="bg-[var(--elev-2)] border border-[var(--border)] rounded-xl px-4 py-2 text-xs font-bold text-[var(--text-dim)]"><i class="fa-solid fa-font text-[var(--v-violet)] mr-1"></i> '+c.text.length+' chars</div>';
    }
    html += '</div></section>';

    html += '<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">';
    
    html += '<div class="lg:col-span-2 flex flex-col gap-6">';
    html += '<section class="white-card p-6">';
    html += '<h3 class="text-base font-black text-[var(--text)] mb-4">Session Setup</h3>';
    html += '<div class="flex flex-wrap items-center gap-3 mb-6" role="group" aria-label="Select Timer Duration">';
    [30, 60, 120, 'sudden'].forEach(function(d){
      var active = state.settings.timerDuration === d;
      var label = d==='sudden' ? '<i class="fa-solid fa-skull text-[var(--v-red)]"></i> Sudden' : d+'s';
      html += '<button data-duration="'+d+'" class="solid-btn timer-btn px-5 py-2.5 text-sm '+(active?'active':'')+'">'+label+'</button>';
    });
    html += '</div>';
    html += '<button id="startSessionBtn" class="solid-btn btn-primary w-full py-4 text-lg flex items-center justify-center gap-2" '+(!unlocked?'disabled':'')+'>' +
      '<i class="fa-solid fa-play" aria-hidden="true"></i> '+(unlocked ? 'Start Typing Session' : 'Locked')+'</button>';
    html += '</section>';
    html += '<section id="liveMonitorCard" class="white-card p-6" aria-label="Live Typing Monitor"></section>';
    html += '</div>';

    html += '<section class="white-card p-6 flex flex-col" aria-label="Recent Session History">';
    html += '<h3 class="text-base font-black text-[var(--text)] mb-4 pb-3 border-b border-[var(--border)]">Recent Runs</h3>';
    html += '<div id="historyList" class="flex-1 overflow-y-auto pr-2"></div>';
    html += '</section></div>';

    document.getElementById('mainPanel').innerHTML = html;

    document.querySelectorAll('.timer-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        var v = btn.dataset.duration;
        state.settings.timerDuration = (v==='sudden') ? 'sudden' : parseInt(v,10);
        saveState(); renderMainPanel();
      });
    });
    document.getElementById('startSessionBtn').addEventListener('click', function(){
      if(unlocked) openTypingSession(c.id);
    });

    renderHistory();
  }

   

  function renderHistory(){
    var list = document.getElementById('historyList');
    if(!list) return;
    var recent = state.history.slice(-8).reverse();
    if(recent.length===0){
      list.innerHTML = '<div class="text-center text-[var(--text-dim)] text-sm py-10 font-medium">No sessions yet.</div>';
      return;
    }
    list.innerHTML = recent.map(function(h){
      var date = new Date(h.timestamp);
      var timeStr = date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      var badge = h.completed 
        ? '<span class="px-2 py-0.5 rounded text-[10px] font-bold bg-[var(--v-green)] text-white shadow-sm">PASS</span>' 
        : '<span class="px-2 py-0.5 rounded text-[10px] font-bold bg-[var(--v-red)] text-white shadow-sm">FAIL</span>';
      
      return '<div class="py-3 border-b border-[var(--border)] last:border-0 hover:bg-[var(--elev-2)] transition-colors rounded-lg px-2 -mx-2">' +
        '<div class="flex items-center justify-between mb-1">' +
          '<div class="font-bold text-sm text-[var(--text)]">' + escapeHtml(h.chapterTitle) + '</div>' +
          badge +
        '</div>' +
        '<div class="flex items-center justify-between text-xs font-semibold text-[var(--text-dim)]">' +
          '<span>' + timeStr + '</span>' +
          '<div class="flex gap-3">' +
            '<span class="text-[var(--v-blue)]">' + h.wpm + ' WPM</span>' +
            '<span class="text-[var(--v-green)]">' + h.accuracy + '%</span>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function openSidebarMobile(){
    document.getElementById('sidebar').classList.remove('-translate-x-full');
    document.getElementById('sidebarBackdrop').classList.remove('hidden');
  }
  function closeSidebarMobile(){
    document.getElementById('sidebar').classList.add('-translate-x-full');
    document.getElementById('sidebarBackdrop').classList.add('hidden');
  }

  /* ===================== Popup Logic ===================== */
  var POPUP_CSS =
    ':root { --bg:#F0F2F5; --elev:#FFFFFF; --elev-2:#F8FAFC; --border:#E5E7EB; --text:#111827; --text-dim:#6B7280; --v-violet:#8B5CF6; --v-indigo:#6366F1; --v-blue:#3B82F6; --v-green:#10B981; --v-yellow:#F59E0B; --v-orange:#F97316; --v-red:#EF4444; }' +
    '*{box-sizing:border-box;margin:0;padding:0;}' +

    'body{background:var(--bg);color:var(--text);font-family:"Inter",system-ui,sans-serif;display:flex;flex-direction:column;}' +

    '.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}' +

    '.stat-val{font-size:32px;font-weight:900;font-family:"Fira Code",monospace;}' +
    '.stat-label{font-size:11px;color:rgba(255,255,255,0.8);margin-top:4px;text-transform:uppercase;font-weight:800;letter-spacing:1px;}' +

    '.summary-sub{color:var(--text-dim);font-size:16px;font-weight:600;}' +
    '.summary-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;width:100%;max-width:800px;}' +

    '.btn-accent:hover{background:#7C3AED;box-shadow:0 6px 16px rgba(139,92,246,0.5);}' +
    '.fail-icon{color:var(--v-red);}' +
    '.success-icon{color:var(--v-green);}';

  function popupMain(CONFIG){
    var text = CONFIG.text;
    var duration = CONFIG.duration;
    var soundOn = CONFIG.soundEnabled;
    var chapterId = CONFIG.chapterId;
    var chapterTitle = CONFIG.chapterTitle;

    var typed = '';
    var totalKeystrokes = 0;
    var errorCount = 0;
    var startTime = null;
    var ended = false;
    var timerInterval = null;
    var elapsedSeconds = 0;
    var timeLeft = (typeof duration === 'number') ? duration : 0;
    var wpmHistory = [];
    var audioCtx = null;
    var charSpans = null;
    var root = document.getElementById('root');

    function escapeChar(ch){
      var map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
      return map[ch] || ch;
    }

    function buildCharSpans(){
      var html = '';
      for(var i=0;i<text.length;i++){
        html += '<span class="pending" data-i="'+i+'">'+escapeChar(text[i])+'</span>';
      }
      var stage = document.getElementById('textStage');
      stage.innerHTML = html;
      charSpans = stage.querySelectorAll('span');
    }

    function renderShell(){
      root.innerHTML =
        '<div class="rainbow-line"></div>' +
        '<div class="wrap">' +
          '<div class="topbar">' +
            '<div class="chapter-name">'+chapterTitle+'</div>' +
            '<div class="mode-badge">'+(duration==='sudden' ? 'Sudden Death' : duration+'s Mode')+'</div>' +
          '</div>' +
          '<div class="stats-row">' +
            '<div class="stat" style="background:var(--v-yellow); color:#111827;"><div class="stat-val" id="statTime">'+(duration==='sudden'?'0s':duration+'s')+'</div><div class="stat-label" style="color:rgba(0,0,0,0.6);">'+(duration==='sudden'?'Elapsed':'Time Left')+'</div></div>' +
            '<div class="stat" style="background:var(--v-blue);"><div class="stat-val" id="statWpm">0</div><div class="stat-label">WPM</div></div>' +
            '<div class="stat" style="background:var(--v-indigo);"><div class="stat-val" id="statNet">0</div><div class="stat-label">Net WPM</div></div>' +
            '<div class="stat" style="background:var(--v-green);"><div class="stat-val" id="statAcc">100%</div><div class="stat-label">Accuracy</div></div>' +
            '<div class="stat" style="background:var(--v-red);"><div class="stat-val" id="statErr">0</div><div class="stat-label">Errors</div></div>' +
          '</div>' +
          '<div class="text-stage" id="textStage" aria-live="polite"></div>' +
          '<div class="hint">Type to begin &middot; Press [ESC] to Abort</div>' +
          '<input id="hiddenInput" class="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" aria-label="Hidden typing input box" />' +
        '</div>';
      buildCharSpans();
      if(charSpans.length){ charSpans[0].classList.add('current'); }
      var inp = document.getElementById('hiddenInput');
      inp.value = '';
      inp.addEventListener('input', onInput);
      inp.focus();
      root.addEventListener('click', function(){ if(!ended) inp.focus(); });
    }

    function renderChars(){
      for(var i=0;i<charSpans.length;i++){
        var span = charSpans[i];
        if(i < typed.length){
          span.className = (typed[i]===text[i]) ? 'correct' : 'incorrect';
        } else {
          span.className = 'pending';
        }
      }
      if(typed.length < charSpans.length){ charSpans[typed.length].classList.add('current'); }
    }

    function computeStats(){
      if(elapsedSeconds===0){
        var acc0 = totalKeystrokes>0 ? Math.round(((totalKeystrokes-errorCount)/totalKeystrokes)*100) : 100;
        return {wpm:0, net:0, acc:acc0};
      }
      var mins = elapsedSeconds/60;
      var wpm = Math.max(0, Math.round((typed.length/5)/mins));
      var net = Math.max(0, Math.round(((typed.length/5)-errorCount)/mins));
      var acc = totalKeystrokes>0 ? Math.round(((totalKeystrokes-errorCount)/totalKeystrokes)*100) : 100;
      return {wpm:wpm, net:net, acc:acc};
    }

    function refreshStatsUI(){
      var s = computeStats();
      document.getElementById('statWpm').textContent = s.wpm;
      document.getElementById('statNet').textContent = s.net;
      document.getElementById('statAcc').textContent = s.acc+'%';
      document.getElementById('statErr').textContent = errorCount;
      document.getElementById('statTime').textContent = duration==='sudden' ? (elapsedSeconds+'s') : (timeLeft+'s');
    }

    function playClick(){
      if(!soundOn) return;
      try{
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        var o = audioCtx.createOscillator(); var g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.value = 800;
        g.gain.setValueAtTime(0.06, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.04);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.04);
      }catch(e){}
    }
    function playError(){
      if(!soundOn) return;
      try{
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        var o = audioCtx.createOscillator(); var g = audioCtx.createGain();
        o.type = 'sawtooth'; o.frequency.setValueAtTime(250, audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime+0.2);
        g.gain.setValueAtTime(0.12, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.2);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.2);
      }catch(e){}
    }

    function sendLiveUpdate(){
      try{
        if(window.opener && !window.opener.closed && window.opener.__typingApp){
          var s = computeStats();
          window.opener.__typingApp.receiveLiveUpdate({
            chapterId: chapterId, wpm: s.wpm, accuracy: s.acc, errors: errorCount, timeLeft: (duration==='sudden' ? null : timeLeft), elapsed: elapsedSeconds
          });
        }
      }catch(e){}
    }

    function startTimer(){
      timerInterval = setInterval(function(){
        if(ended) return;
        elapsedSeconds++;
        if(duration!=='sudden'){
          timeLeft = duration - elapsedSeconds;
          if(timeLeft<=0){
            timeLeft = 0; refreshStatsUI(); wpmHistory.push({t:elapsedSeconds, wpm:computeStats().wpm});
            endSession(typed.length>=text.length); return;
          }
        }
        refreshStatsUI(); wpmHistory.push({t:elapsedSeconds, wpm:computeStats().wpm}); sendLiveUpdate();
      }, 1000);
    }

    function onInput(){
      if(ended) return;
      var inp = document.getElementById('hiddenInput'); var newVal = inp.value;
      if(newVal.length > text.length) newVal = newVal.slice(0, text.length);
      if(startTime===null && newVal.length>0){ startTime = Date.now(); startTimer(); }

      if(newVal.length > typed.length){
        for(var i=typed.length; i<newVal.length; i++){
          totalKeystrokes++;
          var correct = newVal[i]===text[i];
          if(correct){ playClick(); }
          else{
            errorCount++; playError();
            if(duration==='sudden'){
              typed = newVal.slice(0,i+1); inp.value = typed; renderChars(); refreshStatsUI(); endSession(false); return;
            }
          }
        }
      }
      typed = newVal; inp.value = typed; renderChars(); refreshStatsUI();
      if(typed.length >= text.length){ endSession(true); }
    }

    function endSession(completed){
      if(ended) return;
      ended = true; if(timerInterval) clearInterval(timerInterval);
      var s = computeStats();
      var result = {
        chapterId: chapterId, chapterTitle: chapterTitle,
        wpm: s.wpm, netWpm: s.net, accuracy: s.acc, errors: errorCount,
        completed: completed, duration: Math.max(elapsedSeconds,1),
        mode: (duration==='sudden') ? 'sudden' : (duration+'s'), timestamp: Date.now()
      };
      try{ if(window.opener && !window.opener.closed && window.opener.__typingApp){ window.opener.__typingApp.receiveSessionResult(result); } }catch(e){}
      renderSummary(result);
    }

    function buildChartSVG(history){
      var data = history.length ? history : [{t:0,wpm:0}];
      var w=800,h=220,padL=50,padR=10,padT=10,padB=20;
      var innerW = w-padL-padR, innerH = h-padT-padB;
      var maxT = data[data.length-1].t || 1;
      var maxWpmRaw = 10;
      for(var k=0;k<data.length;k++){ if(data[k].wpm>maxWpmRaw) maxWpmRaw = data[k].wpm; }
      var maxWpm = Math.ceil((maxWpmRaw*1.2)/10)*10;

      function X(t){ return padL + (t/maxT)*innerW; }
      function Y(v){ return padT + innerH - (v/maxWpm)*innerH; }

      var pts = data.map(function(p){ return X(p.t).toFixed(1)+','+Y(p.wpm).toFixed(1); }).join(' ');
      var areaPts = pts+' '+X(data[data.length-1].t).toFixed(1)+','+Y(0).toFixed(1)+' '+X(data[0].t).toFixed(1)+','+Y(0).toFixed(1);

      var grid = '';
      for(var i=0;i<=4;i++){
        var v = Math.round(maxWpm*i/4); var y = Y(v);
        grid += '<line class="grid-line" x1="'+padL+'" y1="'+y.toFixed(1)+'" x2="'+(w-padR)+'" y2="'+y.toFixed(1)+'"/>';
        grid += '<text class="grid-label" x="10" y="'+(y+4).toFixed(1)+'">'+v+'</text>';
      }

      return '<svg viewBox="0 0 '+w+' '+h+'" class="chart-svg" xmlns="http://www.w3.org/2000/svg" aria-label="WPM Progression Chart">' +
        '<defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">' +
          '<stop offset="0%" stop-color="#3B82F6" stop-opacity="0.25"/>' +
          '<stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>' +
        '</linearGradient></defs>' +
        grid +
        '<polygon class="chart-area" points="'+areaPts+'"/>' +
        '<polyline class="chart-line" points="'+pts+'"/>' +
      '</svg>';
    }

    function renderSummary(result){
      var success = result.completed;
      var titleText = success ? 'Mission Accomplished' : (duration==='sudden' ? 'Sudden Death' : "Time Expired");
      root.innerHTML =
        '<div class="rainbow-line"></div>' +
        '<div class="summary-wrap">' +
          '<div class="'+(success?'success-icon':'fail-icon')+'" style="font-size:72px;">'+(success?'<i class="fa-solid fa-circle-check"></i>':'<i class="fa-solid fa-triangle-exclamation"></i>')+'</div>' +
          '<div><div class="summary-title" style="color:var('+(success?'--v-green':'--v-red')+');">'+titleText+'</div><div class="summary-sub">Your results have been synced to the dashboard</div></div>' +
          '<div class="summary-stats">' +
            '<div class="stat" style="background:var(--v-blue);"><div class="stat-val">'+result.wpm+'</div><div class="stat-label">WPM</div></div>' +
            '<div class="stat" style="background:var(--v-indigo);"><div class="stat-val">'+result.netWpm+'</div><div class="stat-label">Net WPM</div></div>' +
            '<div class="stat" style="background:var(--v-green);"><div class="stat-val">'+result.accuracy+'%</div><div class="stat-label">Accuracy</div></div>' +
            '<div class="stat" style="background:var(--v-red);"><div class="stat-val">'+result.errors+'</div><div class="stat-label">Errors</div></div>' +
          '</div>' +
          '<div class="chart-card"><h4>Performance Curve</h4><div id="chartHolder"></div></div>' +
          '<div class="btn-row">' +
            '<button id="retryBtn" class="btn btn-default">Try Again</button>' +
            '<button id="closeBtn" class="btn btn-accent">Close Window</button>' +
          '</div>' +
        '</div>';
      
      var fa = document.createElement('link'); fa.rel='stylesheet'; fa.href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css';
      document.head.appendChild(fa);

      document.getElementById('chartHolder').innerHTML = buildChartSVG(wpmHistory);
      document.getElementById('retryBtn').addEventListener('click', resetAndRestart);
      document.getElementById('closeBtn').addEventListener('click', function(){ window.close(); });
    }

    function resetAndRestart(){
      typed=''; totalKeystrokes=0; errorCount=0; startTime=null; ended=false;
      elapsedSeconds=0; timeLeft=(typeof duration==='number')?duration:0; wpmHistory=[];
      if(timerInterval) clearInterval(timerInterval); renderShell();
    }

    document.addEventListener('keydown', function(e){
      if(e.key==='Escape'){ if(ended || confirm('Exit typing session? Progress will be lost.')){ window.close(); } }
    });

    renderShell();
  }

  function openTypingSession(chapterId){
    if(activePopup && !activePopup.closed){ activePopup.focus(); return; }
    var chapter = CHAPTERS.find(function(c){ return c.id===chapterId; });
    if(!chapter) return;

    var popup = window.open('', 'TypingWorld_vibrant_session', 'width=1100,height=750,resizable=yes,scrollbars=no,toolbar=no,menubar=no,location=no,status=no');
    if(!popup){ alert('Please allow pop-ups to start the session.'); return; }

    var shellHtml = '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>'+escapeHtml(chapter.title)+' - TypingWorld Practice Session</title><link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@500;700&family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet"><style>'+POPUP_CSS+'</style></head><body><div id="root"></div></body></html>';
    popup.document.open(); popup.document.write(shellHtml); popup.document.close();

    var cfg = { chapterId: chapter.id, chapterTitle: chapter.title, text: chapter.text, duration: state.settings.timerDuration, soundEnabled: state.settings.soundEnabled };
    var scriptEl = popup.document.createElement('script');
    scriptEl.textContent = '(' + popupMain.toString() + ')(' + JSON.stringify(cfg) + ');';
    popup.document.body.appendChild(scriptEl);

    activePopup = popup;
    liveData = { chapterId: chapter.id, wpm:0, accuracy:100, errors:0, timeLeft:(typeof cfg.duration==='number'?cfg.duration:null), elapsed:0 };
    renderLiveMonitor(); watchPopup();
  }

  function watchPopup(){
    if(popupWatcherInterval) clearInterval(popupWatcherInterval);
    popupWatcherInterval = setInterval(function(){
      if(activePopup && activePopup.closed){ clearInterval(popupWatcherInterval); activePopup = null; liveData = null; renderLiveMonitor(); }
    }, 800);
  }

  window.__typingApp = {
    receiveLiveUpdate: function(data){ liveData = data; renderLiveMonitor(); },
    receiveSessionResult: function(result){
      state.history.push(result);
      if(state.history.length>200) state.history = state.history.slice(-200);

      if(result.completed){
        var prev = state.completed[result.chapterId];
        state.completed[result.chapterId] = {
          bestWpm: prev ? Math.max(prev.bestWpm, result.wpm) : result.wpm,
          bestNet: prev ? Math.max(prev.bestNet, result.netWpm) : result.netWpm,
          bestAccuracy: prev ? Math.max(prev.bestAccuracy, result.accuracy) : result.accuracy,
          attempts: prev ? prev.attempts+1 : 1, completedAt: result.timestamp
        };
      }
      saveState(); liveData = null; renderLifetimeStats(); renderSidebar(); renderMainPanel();
    }
  };

  // Google Sheets Fetch Logic Implementation
  function loadChaptersFromSheet() {
    Papa.parse(SHEET_CSV_URL, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        // Map the CSV data to the exact format needed by TypingWorld (Tier is removed)
        CHAPTERS = results.data.map(function(row) {
          return {
            id: parseInt(row.id, 10) || 0,
            title: row.title || 'Untitled Chapter',
            text: row.text || ''
          };
        });
        
        // Remove loading state and initialize the app if chapters exist
        if (CHAPTERS.length > 0) {
          selectedChapterId = CHAPTERS[0].id; // Set default chapter to the first one available
          init();
        } else {
          document.getElementById('mainPanel').innerHTML = '<div class="white-card p-10 text-center text-red-500 font-bold"><i class="fa-solid fa-triangle-exclamation text-3xl mb-4"></i><h2>No chapters found in the Google Sheet.</h2></div>';
        }
      },
      error: function(error) {
        console.error("Sheet load error:", error);
        document.getElementById('mainPanel').innerHTML = '<div class="white-card p-10 text-center text-red-500 font-bold"><i class="fa-solid fa-triangle-exclamation text-3xl mb-4"></i><h2>Chapters load nahi ho paaye. Internet connection ya CSV link check karein.</h2></div>';
      }
    });
  }

  function init(){
    applySoundIcon();
    renderLifetimeStats(); renderSidebar(); renderMainPanel();
    
    document.getElementById('soundToggle').addEventListener('click', function(){
      state.settings.soundEnabled = !state.settings.soundEnabled; saveState(); applySoundIcon();
    });
    document.getElementById('resetBtn').addEventListener('click', function(){
      if(confirm('Reset all your typing data? This action cannot be undone.')){
        state = defaultState(); saveState(); selectedChapterId = CHAPTERS.length > 0 ? CHAPTERS[0].id : 1;
        applySoundIcon(); renderLifetimeStats(); renderSidebar(); renderMainPanel();
      }
    });
    document.getElementById('sidebarToggle').addEventListener('click', openSidebarMobile);
    document.getElementById('sidebarClose').addEventListener('click', closeSidebarMobile);
    document.getElementById('sidebarBackdrop').addEventListener('click', closeSidebarMobile);
  }

  // Start the app by fetching the data first
  loadChaptersFromSheet();

})();
